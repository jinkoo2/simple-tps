<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simple TPS Viewer</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/styles.css" />
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0?target=es2022",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?deps=react@18.2.0&target=es2022",
          "@mui/x-tree-view/SimpleTreeView": "https://esm.sh/@mui/x-tree-view@7.29.1/SimpleTreeView?deps=react@18.2.0,react-dom@18.2.0&target=es2022",
          "@mui/x-tree-view/TreeItem": "https://esm.sh/@mui/x-tree-view@7.29.1/TreeItem?deps=react@18.2.0,react-dom@18.2.0&target=es2022"
        }
      }
    </script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div id="sidebar-root"></div>
      </aside>

      <main class="viewer">
        <div class="toolbar">
          <button id="reload-button" type="button">Reload</button>
          <button id="property-toggle" type="button">Properties</button>
          <span id="load-status">No patient loaded</span>
        </div>
        <canvas id="niivue-canvas"></canvas>
      </main>

      <aside id="property-root" class="property-pane"></aside>
    </div>

    <script type="module" src="/static/tree_app.js"></script>
  </body>
</html>
