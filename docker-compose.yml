services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: simple-tps:latest
    working_dir: /workspace
    ports:
      - "8013:8000"
    volumes:
      - .:/workspace
  cli:
    image: simple-tps:latest
    profiles: ["tools"]
    working_dir: /workspace
    entrypoint: ["simple-tps"]
    command: ["--help"]
    volumes:
      - .:/workspace
