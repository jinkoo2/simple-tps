services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: simple-tps:latest
    working_dir: /workspace
    ports:
      - "127.0.0.1:8013:8000"
    environment:
      SIMPLE_TPS_AUTH_USER: ${SIMPLE_TPS_AUTH_USER:-}
      SIMPLE_TPS_AUTH_PASSWORD: ${SIMPLE_TPS_AUTH_PASSWORD:-}
    volumes:
      - .:/workspace
  cli:
    image: simple-tps:latest
    profiles: ["tools"]
    working_dir: /workspace
    entrypoint: ["simple-tps"]
    command: ["--help"]
    volumes:
      - .:/workspace
